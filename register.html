<!DOCTYPE html>
<html lang="en" class="auth-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | GEOINTEL Analytics</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="auth-page bg-primary grid-bg d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <!-- Top Right Controls -->
    <div class="auth-top-controls position-absolute top-0 end-0 m-3 d-flex gap-2 z-3">
        <button class="btn btn-icon-circle border-info border-opacity-25" id="themeToggle" title="Toggle Theme">
            <i class="bi bi-moon-stars text-info"></i>
        </button>
        <button class="btn btn-icon-circle border-info border-opacity-25" id="rtlToggle" title="Toggle RTL">
            <i class="bi bi-arrow-left-right text-info"></i>
        </button>
    </div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-4">
                <div class="geo-card border-info border-opacity-10 shadow-2xl mt-5">
                    <div class="text-center mb-4">
                        <a class="navbar-brand d-inline-flex align-items-center fs-3" href="index.html">
                            <i class="bi bi-broadcast text-info me-2"></i>
                            <span class="fw-bold text-white">GEO<span class="text-info">INTEL</span></span>
                        </a>
                        <div class="smaller text-muted mt-1 tracking-widest text-uppercase">Account Initialization</div>
                    </div>
                    
                    <form action="dashboard.html">
                        <div class="mb-3">
                            <label class="form-label small text-info opacity-75">Full Name</label>
                            <input type="text" class="form-control bg-dark border-info border-opacity-25 text-white" placeholder="Enter your full name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-info opacity-75">Organization</label>
                            <input type="text" class="form-control bg-dark border-info border-opacity-25 text-white" placeholder="Company or Agency">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-info opacity-75">Email Address</label>
                            <input type="email" class="form-control bg-dark border-info border-opacity-25 text-white" placeholder="name@company.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small text-info opacity-75">Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control bg-dark border-info border-opacity-25 text-white" id="passwordInput" placeholder="Create password" required>
                                <button class="btn btn-outline-info border-info border-opacity-25" type="button" onclick="togglePassword()">
                                    <i class="bi bi-eye" id="toggleIcon"></i>
                                </button>
                            </div>
                        </div>
                        <div class="form-check mb-4 small text-muted">
                            <input class="form-check-input" type="checkbox" id="terms" required>
                            <label class="form-check-label" for="terms">
                                I agree to the <a href="#" class="text-info text-decoration-none hover-glow">Terms of Service</a>
                            </label>
                        </div>
                        <button type="submit" class="auth-submit-btn btn btn-geo w-100 py-2 fw-bold">Register</button>

                        <div class="text-center my-4 position-relative">
                            <hr class="border-info border-opacity-25">
                            <span class="position-absolute top-50 start-50 translate-middle bg-primary px-3 smaller text-muted" id="or-separator">OR</span>
                        </div>

                        <div class="d-grid gap-2">
                            <a href="#" class="btn-social">
                                <i class="bi bi-google"></i> Register with Google
                            </a>
                            <a href="#" class="btn-social">
                                <i class="bi bi-apple"></i> Register with Apple
                            </a>
                        </div>
                    </form>
                    
                    <div class="mt-4 text-center small text-muted">
                        Already registered? <a href="login.html" class="text-info text-decoration-none hover-glow fw-bold">Secure Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('toggleIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }
    </script>
    <script src="assets/js/main.js"></script>
</body>
</html>
