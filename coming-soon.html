<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launching Soon | GEOINTEL</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-primary grid-bg d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="container text-center px-4">
        <div class="badge bg-info text-dark mb-4 px-3 py-2">SATELLITE IN TRANSIT</div>
        <h1 class="display-3 fw-bold text-white mb-4">Establishing <span class="text-info">Uplink</span></h1>
        <p class="text-muted mb-5 mx-auto" style="max-width: 600px;">Our new high-cadence monitoring portal is currently in its final calibration phase. Launch sequence initiated.</p>
        
        <div class="row justify-content-center mb-5">
            <div class="col-auto">
                <div class="geo-card py-3 px-4">
                    <div class="h2 mb-0">12</div>
                    <div class="smaller text-muted">DAYS</div>
                </div>
            </div>
            <div class="col-auto">
                <div class="geo-card py-3 px-4">
                    <div class="h2 mb-0">08</div>
                    <div class="smaller text-muted">HOURS</div>
                </div>
            </div>
            <div class="col-auto">
                <div class="geo-card py-3 px-4">
                    <div class="h2 mb-0">45</div>
                    <div class="smaller text-muted">MINUTES</div>
                </div>
            </div>
        </div>
        
        <div class="col-lg-5 mx-auto">
            <div class="input-group">
                <input type="email" class="form-control bg-dark border-info border-opacity-25 text-white" placeholder="Enter email for launch alerts">
                <button class="btn btn-geo">Notify Me</button>
            </div>
        </div>
        
        <div class="mt-5">
            <a href="index.html" class="text-info text-decoration-none small"><i class="bi bi-arrow-left me-1"></i> Back to Primary Node</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
